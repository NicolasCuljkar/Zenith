<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="zgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fa3e8"/>
      <stop offset="100%" stop-color="#e06fa0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fa3e8"/>
      <stop offset="100%" stop-color="#e06fa0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="95" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Accent line top -->
  <rect x="80" y="112" width="352" height="5" rx="3" fill="url(#line)" opacity="0.9" filter="url(#glow)"/>

  <!-- Z shape (polyline approach for clean sharp Z) -->
  <text
    x="256"
    y="360"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="310"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-10"
    fill="url(#zgrad)"
    filter="url(#glow)"
  >Z</text>

  <!-- Accent line bottom -->
  <rect x="80" y="394" width="352" height="5" rx="3" fill="url(#line)" opacity="0.9" filter="url(#glow)"/>
</svg>
